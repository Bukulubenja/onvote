<!DOCTYPE html>
<html>
<head>
    <title>Vote Successful</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }

        h2 {
            color: #28a745;
        }

        p {
            color: #555;
            margin: 15px 0;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Thank you for voting!</h2>

    <p>Your vote has been recorded successfully and cannot be changed.</p>

    <a class="btn" href="/logout/">Logout</a>
</div>

<script>
    setTimeout(() => {
        window.location.href = "/logout/";
    }, 2000);
</script>

</body>
</html>
