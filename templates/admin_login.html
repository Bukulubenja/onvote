<!DOCTYPE html>
<html>
<head>

<title>Election Control Center</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Segoe UI;
    background:linear-gradient(
        135deg,
        #003152,
        #001d33
    );
}

.login-card{

    width:420px;
    background:white;

    padding:40px;

    border-radius:20px;

    box-shadow:
    0 20px 40px rgba(0,0,0,.25);

    text-align:center;
}

.logo{

    width:90px;
    height:90px;

    background:#ffcc99;

    border-radius:50%;

    margin:auto;

    display:flex;

    justify-content:center;
    align-items:center;

    font-size:40px;
}

h1{
    color:#003152;
}

.subtitle{
    color:#777;
    margin-bottom:30px;
}

input{

    width:100%;
    padding:15px;

    margin-bottom:15px;

    border:1px solid #ddd;
    border-radius:10px;

    box-sizing:border-box;
}

button{

    width:100%;

    padding:15px;

    border:none;

    border-radius:10px;

    background:#003152;

    color:white;

    font-size:16px;

    cursor:pointer;
}

button:hover{
    background:#004d7f;
}

.error{
    color:red;
    margin-bottom:10px;
}

.footer{
    margin-top:20px;
    color:#999;
    font-size:13px;
}

</style>

</head>

<body>

<div class="login-card">

    <div class="logo">
        🗳
    </div>

    <h1>Election Control Center</h1>

    <div class="subtitle">
        St. Kizito SS Kabowa
    </div>

    {% for message in messages %}
        <div class="error">
            {{ message }}
        </div>
    {% endfor %}

    <form method="POST">

        {% csrf_token %}

        <input
            type="text"
            name="username"
            placeholder="Username"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Sign In
        </button>

    </form>

    <div class="footer">
        School Voting Management System
    </div>

</div>

</body>
</html>
